site_name: CodexOpt
site_description: Benchmark and optimize AGENTS.md and SKILL.md for Codex
site_url: https://superagenticai.github.io/CodexOpt/
repo_url: https://github.com/SuperagenticAI/CodexOpt
repo_name: SuperagenticAI/CodexOpt
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/codexopt_logo.png
  favicon: assets/codexopt_favicon.png
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SuperagenticAI/CodexOpt
    - icon: material/play-box
      link: https://github.com/SuperagenticAI/codexopt-demo

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Benchmarking: benchmarking.md
  - Optimization: optimization.md
  - Demo Repo: demo.md
  - FAQ: faq.md
